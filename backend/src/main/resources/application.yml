spring:
  application:
    name: fidc-cdc-kogito-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fidc_cdc}
    username: ${SPRING_DATASOURCE_USERNAME:fidc}
    password: ${SPRING_DATASOURCE_PASSWORD:fidc}
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_MAX_POOL_SIZE:15}
      minimum-idle: ${SPRING_DATASOURCE_MIN_IDLE:3}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
    open-in-view: false
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${SPRING_KAFKA_CONSUMER_GROUP_ID:fidc-cdc-kogito}
      auto-offset-reset: ${SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET:earliest}
    producer:
      acks: ${SPRING_KAFKA_PRODUCER_ACKS:all}
      retries: ${SPRING_KAFKA_PRODUCER_RETRIES:3}
    properties:
      spring.json.trusted.packages: "*"
      spring.json.value.default.type: com.fidc.cdc.kogito.infrastructure.messaging.ProcessEventPayload

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

fidc:
  api:
    version: v1
  jobs:
    service-url: ${FIDC_JOBS_SERVICE_URL:http://localhost:8085}
    callback-base-url: ${FIDC_JOBS_CALLBACK_BASE_URL:http://localhost:8080/api/v1/process/jobs/callbacks}
  data-index:
    url: ${FIDC_DATA_INDEX_URL:http://localhost:8180/graphql}
  consoles:
    task-console-url: ${FIDC_TASK_CONSOLE_URL:http://localhost:8280}
    management-console-url: ${FIDC_MANAGEMENT_CONSOLE_URL:http://localhost:8380}
  messaging:
    topics:
      process: ${FIDC_TOPIC_PROCESS:fidc.process.events}
      tasks: ${FIDC_TOPIC_TASKS:fidc.task.events}
      audit: ${FIDC_TOPIC_AUDIT:fidc.audit.events}
  read-model:
    kafka-listener-enabled: ${FIDC_READ_MODEL_KAFKA_LISTENER_ENABLED:false}
  registradora:
    base-url: ${FIDC_REGISTRADORA_BASE_URL:http://localhost:8090}
    username: ${FIDC_REGISTRADORA_USERNAME:registradora}
    password: ${FIDC_REGISTRADORA_PASSWORD:registradora}
    retries:
      max-attempts: ${FIDC_REGISTRADORA_RETRY_MAX_ATTEMPTS:3}
      delay: ${FIDC_REGISTRADORA_RETRY_DELAY:1s}
