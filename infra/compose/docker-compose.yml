name: fidc-cdc-kogito

services:
  postgres:
    image: postgres:16
    mem_limit: 768m
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: fidc
      POSTGRES_PASSWORD: fidc
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fidc -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:4.0.2
    mem_limit: 1g
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  jobs-service:
    image: apache/incubator-kie-kogito-jobs-service-postgresql:10.1.0
    mem_limit: 512m
    ports:
      - "8085:8080"
    depends_on:
      kafka:
        condition: service_healthy
      data-index:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KOGITO_JOBS_SERVICE_DATA_INDEX_URL: http://data-index:8080
      QUARKUS_DATASOURCE_DB_KIND: postgresql
      QUARKUS_DATASOURCE_USERNAME: fidc
      QUARKUS_DATASOURCE_PASSWORD: fidc
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/kogito_jobs
      QUARKUS_DATASOURCE_REACTIVE_URL: postgresql://postgres:5432/kogito_jobs
      QUARKUS_FLYWAY_MIGRATE_AT_START: "true"

  data-index:
    image: apache/incubator-kie-kogito-data-index-postgresql:10.1.0
    mem_limit: 768m
    ports:
      - "8180:8080"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KOGITO_DATA_INDEX_QUARKUS_PROFILE: kafka-events-support
      KOGITO_SERVICE_URL: http://backend:8080
      JAVA_OPTIONS: -Dkogito.service.url=http://backend:8080
      QUARKUS_HTTP_CORS: "true"
      QUARKUS_HTTP_CORS_ORIGINS: http://localhost:3000,http://localhost:8280,http://localhost:8380
      QUARKUS_HTTP_CORS_METHODS: GET,POST,OPTIONS
      QUARKUS_HTTP_CORS_HEADERS: accept,authorization,content-type,x-requested-with
      QUARKUS_HTTP_CORS_ACCESS_CONTROL_ALLOW_CREDENTIALS: "true"
      QUARKUS_DATASOURCE_DB_KIND: postgresql
      QUARKUS_DATASOURCE_USERNAME: fidc
      QUARKUS_DATASOURCE_PASSWORD: fidc
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/kogito_data_index
      QUARKUS_FLYWAY_MIGRATE_AT_START: "true"
      QUARKUS_HIBERNATE_ORM_DATABASE_GENERATION: update

  keycloak:
    image: quay.io/keycloak/keycloak:legacy
    mem_limit: 768m
    ports:
      - "8480:8080"
    environment:
      DB_VENDOR: h2
      KEYCLOAK_USER: admin
      KEYCLOAK_PASSWORD: admin123
      KEYCLOAK_IMPORT: /tmp/kogito-realm.json
    volumes:
      - ../keycloak/kogito-realm.json:/tmp/kogito-realm.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/auth/realms/kogito"]
      interval: 5s
      timeout: 5s
      retries: 20

  task-console:
    image: quay.io/kiegroup/kogito-task-console:latest
    mem_limit: 384m
    ports:
      - "8280:8080"
    depends_on:
      data-index:
        condition: service_started
      backend:
        condition: service_started
      keycloak:
        condition: service_healthy
    environment:
      KOGITO_DATAINDEX_HTTP_URL: http://localhost:8180/graphql
      KOGITO_TASK_CONSOLE_PROPS: >-
        -Dkogito.consoles.keycloak.config.url=http://localhost:8480/auth
        -Dkogito.consoles.keycloak.config.realm=kogito
        -Dkogito.consoles.keycloak.config.client-id=kogito-console-quarkus
        -Dkogito.consoles.keycloak.config.health-check-url=http://localhost:8480/auth/realms/kogito/.well-known/openid-configuration

  management-console:
    image: quay.io/kiegroup/kogito-management-console:latest
    mem_limit: 384m
    ports:
      - "8380:8080"
    depends_on:
      data-index:
        condition: service_started
      backend:
        condition: service_started
      keycloak:
        condition: service_healthy
    environment:
      KOGITO_DATAINDEX_HTTP_URL: http://localhost:8180/graphql
      KOGITO_MANAGEMENT_CONSOLE_PROPS: >-
        -Dkogito.consoles.keycloak.config.url=http://localhost:8480/auth
        -Dkogito.consoles.keycloak.config.realm=kogito
        -Dkogito.consoles.keycloak.config.client-id=kogito-console-quarkus
        -Dkogito.consoles.keycloak.config.health-check-url=http://localhost:8480/auth/realms/kogito/.well-known/openid-configuration

  backend:
    build:
      context: ../../backend
    mem_limit: 1g
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      jobs-service:
        condition: service_started
      data-index:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/fidc_cdc
      SPRING_DATASOURCE_USERNAME: fidc
      SPRING_DATASOURCE_PASSWORD: fidc
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      FIDC_RUNTIME_INTERNAL_SERVICE_URL: http://backend:8080
      FIDC_RUNTIME_PUBLIC_SERVICE_URL: http://localhost:8080
      FIDC_JOBS_SERVICE_URL: http://jobs-service:8080
      FIDC_JOBS_PUBLIC_SERVICE_URL: http://localhost:8085
      FIDC_JOBS_CALLBACK_BASE_URL: http://backend:8080/api/v1/process/jobs/callbacks
      FIDC_DATA_INDEX_URL: http://localhost:8180/graphql

  frontend:
    build:
      context: ../../frontend
    mem_limit: 768m
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
    environment:
      FIDC_API_INTERNAL_URL: http://backend:8080/api/v1
      NEXT_PUBLIC_FIDC_API_URL: http://localhost:8080/api/v1
      NEXT_PUBLIC_FIDC_API_USERNAME: operador
      NEXT_PUBLIC_FIDC_API_PASSWORD: operador123
      NODE_OPTIONS: --max-old-space-size=512

volumes:
  postgres-data:
  kafka-data:
