name: fidc-cdc-kogito

services:
  mysql:
    image: mysql:8.4
    mem_limit: 768m
    environment:
      MYSQL_DATABASE: fidc_cdc
      MYSQL_USER: fidc
      MYSQL_PASSWORD: fidc
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongodb:
    image: mongo:8.0
    mem_limit: 512m
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:4.0.2
    mem_limit: 1g
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  jobs-service:
    image: quay.io/kiegroup/kogito-jobs-service-ephemeral:latest
    mem_limit: 512m
    ports:
      - "8085:8080"
    depends_on:
      kafka:
        condition: service_healthy
      data-index:
        condition: service_started
    environment:
      KOGITO_JOBS_SERVICE_DATA_INDEX_URL: http://data-index:8080

  data-index:
    image: quay.io/kiegroup/kogito-data-index-ephemeral:latest
    mem_limit: 768m
    ports:
      - "8180:8080"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  keycloak:
    image: quay.io/keycloak/keycloak:legacy
    mem_limit: 768m
    ports:
      - "8480:8080"
    environment:
      DB_VENDOR: h2
      KEYCLOAK_USER: admin
      KEYCLOAK_PASSWORD: admin123
      KEYCLOAK_IMPORT: /tmp/kogito-realm.json
    volumes:
      - ../keycloak/kogito-realm.json:/tmp/kogito-realm.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/auth/realms/kogito"]
      interval: 5s
      timeout: 5s
      retries: 20

  task-console:
    image: quay.io/kiegroup/kogito-task-console:latest
    mem_limit: 384m
    ports:
      - "8280:8080"
    depends_on:
      data-index:
        condition: service_started
      backend:
        condition: service_started
      keycloak:
        condition: service_healthy
    environment:
      KOGITO_DATAINDEX_HTTP_URL: http://localhost:8180/graphql
      KOGITO_TASK_CONSOLE_PROPS: >-
        -Dkogito.consoles.keycloak.config.url=http://localhost:8480/auth
        -Dkogito.consoles.keycloak.config.realm=kogito
        -Dkogito.consoles.keycloak.config.client-id=kogito-console-quarkus
        -Dkogito.consoles.keycloak.config.health-check-url=http://localhost:8480/auth/realms/kogito/.well-known/openid-configuration

  management-console:
    image: quay.io/kiegroup/kogito-management-console:latest
    mem_limit: 384m
    ports:
      - "8380:8080"
    depends_on:
      data-index:
        condition: service_started
      backend:
        condition: service_started
      keycloak:
        condition: service_healthy
    environment:
      KOGITO_DATAINDEX_HTTP_URL: http://localhost:8180/graphql
      KOGITO_MANAGEMENT_CONSOLE_PROPS: >-
        -Dkogito.consoles.keycloak.config.url=http://localhost:8480/auth
        -Dkogito.consoles.keycloak.config.realm=kogito
        -Dkogito.consoles.keycloak.config.client-id=kogito-console-quarkus
        -Dkogito.consoles.keycloak.config.health-check-url=http://localhost:8480/auth/realms/kogito/.well-known/openid-configuration

  backend:
    build:
      context: ../../backend
    mem_limit: 1g
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      jobs-service:
        condition: service_started
      data-index:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/fidc_cdc
      SPRING_DATASOURCE_USERNAME: fidc
      SPRING_DATASOURCE_PASSWORD: fidc
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/fidc_cdc_read
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      FIDC_JOBS_SERVICE_URL: http://jobs-service:8080
      FIDC_DATA_INDEX_URL: http://data-index:8080/graphql

  frontend:
    build:
      context: ../../frontend
    mem_limit: 384m
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
    environment:
      FIDC_API_INTERNAL_URL: http://backend:8080/api/v1
      NEXT_PUBLIC_FIDC_API_URL: http://localhost:8080/api/v1
      NEXT_PUBLIC_FIDC_API_USERNAME: operador
      NEXT_PUBLIC_FIDC_API_PASSWORD: operador123

volumes:
  mysql-data:
  mongodb-data:
  kafka-data:
